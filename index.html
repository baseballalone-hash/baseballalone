<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- 제목은 src/main.js 에서 현재 locale 기준으로 갱신 (기본 영어) -->
  <title>Ninth Inning Rebirth</title>
  <meta name="description" content="Live a baseball player's entire career — from high-school rookie to retirement. Set your training, manage condition and injuries, and watch every season simulate in this baseball life-sim." />

  <!-- Favicon / app icon -->
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />

  <!-- Open Graph / social preview -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Ninth Inning Rebirth" />
  <meta property="og:description" content="A baseball career life-sim: grow a player from high-school rookie to retirement, one season at a time." />
  <meta property="og:image" content="https://baseball-alone.web.app/assets/img/title-hero.webp" />
  <meta property="og:url" content="https://baseball-alone.web.app/" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="stylesheet" href="styles/main.css?v=8" />
  <!-- HTTP 캐시는 firebase.json hosting.headers 에서 제어 (HTML no-cache). dev용 no-cache meta 제거. -->

  <!-- ───────────────────────────────────────────────────────────────
       게임 광고(모네타이즈) — GameMonetize.com SDK (웹게임 전용 전면/보상형 광고).
       전면 광고는 시작 / 3시즌마다 / 은퇴 시점에 노출 (호출: src/systems/ads.js).
       ⚠ gameId 를 GameMonetize 에 게임 등록 후 받은 ID로 교체하세요.
         (placeholder 면 광고 미노출. SDK 가 광고 UI·게임 일시정지를 직접 처리.)
  ──────────────────────────────────────────────────────────────── -->
  <script>
    window.SDK_OPTIONS = {
      gameId: "tyjw4mgt7w0qkvu09hs0gfo0m460ktbi",
      onEvent: function (a) {
        // 광고 동안 게임/BGM 일시정지 (main.js 가 __adPause/__adResume 설정).
        if (a.name === "SDK_GAME_PAUSE") { try { window.__adPause && window.__adPause(); } catch (e) {} }
        else if (a.name === "SDK_GAME_START") { try { window.__adResume && window.__adResume(); } catch (e) {} }
      },
    };
    (function (a, b, c) {
      var d = a.getElementsByTagName(b)[0];
      if (a.getElementById(c)) return;
      var s = a.createElement(b); s.id = c;
      s.src = "https://api.gamemonetize.com/sdk.js";
      d.parentNode.insertBefore(s, d);
    })(document, "script", "gamemonetize-sdk");
  </script>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="topbar-info" id="topbar-info"></div>
      <button id="pause-toggle" class="locale-toggle" type="button"></button>
      <button id="locale-toggle" class="locale-toggle" type="button"></button>
    </header>
    <main id="view-root"></main>
    <footer class="bottombar">
      <span id="footer-status"></span>
      <span class="footer-title" id="footer-title"></span>
    </footer>
  </div>
  <!-- 광고는 전면(인터스티셜)으로 시작/3시즌마다/은퇴 시점에 노출 — src/systems/ads.js -->
  <script type="module" src="src/main.js?v=44"></script>
</body>
</html>
